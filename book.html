<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 التفاصيل | Novella</title>
<link rel="icon" type="image/png" href="Photo/Logo No.png">
<link rel="stylesheet" href="book.css">
</head>
<body>

<div class="book-container">
    <h1 id="book-title">عنوان الكتاب</h1>

    <!-- صورة الكتاب -->
    <img id="book-image" src="" alt="صورة الكتاب">

    <p id="book-price">سعر الكتاب</p>

    <p id="book-page">عدد الصفحات</p>

    <p id="book-desc">وصف الكتاب سيظهر هنا</p>

    <div class="chat-wrapper">
        <button id="chat-btn" class="chat-btn">طلب الان</button>


        <div id="chat-options" class="chat-options">
            <a href="https://www.facebook.com/profile.php?id=61585602473121" target="_blank" class="chat-option fb">
                فيسبوك
            </a>
            <a href="https://www.instagram.com/novella_library/" target="_blank" class="chat-option ig">
                إنستغرام
            </a>
        </div>


        <button id="back-btn" class="back-books">العودة</button>
    </div>

</div>

<!-- خلفية القراءة المتحركة -->
<div class="reading-bg">
    <div class="page p1"></div>
    <div class="page p2"></div>
    <div class="page p3"></div>
    <div class="page p4"></div>
</div>

<script src="book.js"></script>
</body>
</html>
